# Declarative spec for hackathon submission. Runtime implementation:
# lib/antigravity-client.ts (orchestrator) + lib/agents/*.ts — see AGENTS.md
name: raast_flow_main
description: Main workflow orchestrating the content-to-action pipeline for Raast-Flow.
steps:
  - id: step_1_parser
    agent: agent1_parser
    inputs: 
      image_url: ${{ workflow.inputs.image_url }}
      raw_text: ${{ workflow.inputs.raw_text }}
  - id: step_2_lookup
    agent: agent2_lookup
    inputs:
      invoiceId: ${{ step_1_parser.outputs.extractedReference }}
  - id: step_3_matcher
    agent: agent3_matcher
    inputs:
      paymentAmount: ${{ step_1_parser.outputs.extractedAmount }}
      invoiceAmount: ${{ step_2_lookup.outputs.amount }}
  - id: step_4_decision
    agent: agent4_decision
    inputs:
      matchType: ${{ step_3_matcher.outputs.matchType }}
  - id: step_5_simulator
    agent: agent5_simulator
    inputs:
      action: ${{ step_4_decision.outputs.recommendedAction }}
      invoiceId: ${{ step_1_parser.outputs.extractedReference }}
